<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wealth Master - Tier 1</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Prompt', 'sans-serif'] },
                    colors: { slate: { 850: '#151e2e', 900: '#0f172a', 950: '#020617' } }
                }
            }
        }
    </script>

    <style>
        body { background-color: #0a0f1d; color: #f8fafc; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .tab-content { display: none; animation: fadeIn 0.3s ease-in-out; padding-bottom: 100px; /* เผื่อพื้นที่ให้ตะกร้า */ }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .wm-input {
            width: 100%; background-color: #1e293b; border: 1px solid #334155; border-radius: 0.75rem;
            padding: 0.75rem 1rem; color: #f8fafc; font-size: 1rem; outline: none; transition: border-color 0.2s;
        }
        .wm-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
        .wm-label { display: block; font-size: 0.875rem; font-weight: 600; color: #94a3b8; margin-bottom: 0.5rem; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <!-- DATA LISTS (For Autocomplete) -->
    <datalist id="list-sub-accounts"></datalist>
    <datalist id="list-categories"></datalist>
    <datalist id="list-assets"></datalist>
    <datalist id="list-debts"></datalist>

    <!-- HEADER -->
    <header class="bg-slate-900 border-b border-slate-800 sticky top-0 z-50 shadow-md">
        <div class="flex justify-between items-center p-4">
            <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">
                <i class="fa-solid fa-gem text-blue-400 mr-2"></i>Wealth Master
            </h1>
            <div class="flex items-center gap-3">
                <span id="data-sync-dot" class="w-3 h-3 bg-green-500 rounded-full animate-pulse hidden"></span>
                <span id="offline-badge" class="hidden bg-red-500 text-white text-xs px-2 py-1 rounded-full font-bold">Offline</span>
                <button onclick="toggleQueueList()" class="text-slate-300 hover:text-white bg-slate-800 px-3 py-1.5 rounded-lg text-sm font-bold transition-colors">
                    <i class="fa-solid fa-basket-shopping mr-1 text-blue-400"></i> <span id="header-queue-count">0</span>
                </button>
            </div>
        </div>

        <!-- TABS NAVIGATION -->
        <nav class="flex overflow-x-auto hide-scrollbar px-2 pb-2 gap-2 bg-slate-900">
            <button onclick="openTab('tab_income')" class="tab-btn active px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap bg-emerald-500/20 text-emerald-400 border border-emerald-500/50">รายรับ</button>
            <button onclick="openTab('tab_expense')" class="tab-btn px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap bg-slate-800 text-slate-400 hover:bg-slate-700">รายจ่าย</button>
            <button onclick="openTab('tab_journal')" class="tab-btn px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap bg-slate-800 text-slate-400 hover:bg-slate-700">โอน/ลงทุน/หนี้</button>
            <button onclick="openTab('tab_asset')" class="tab-btn px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap bg-slate-800 text-slate-400 hover:bg-slate-700">จัดการ Asset</button>
            <button onclick="openTab('tab_debt')" class="tab-btn px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap bg-slate-800 text-slate-400 hover:bg-slate-700">จัดการ หนี้สิน</button>
            <button onclick="openTab('tab_bucket')" class="tab-btn px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap bg-slate-800 text-slate-400 hover:bg-slate-700">จัดการ กระเป๋า</button>
            <button onclick="openTab('tab_recv')" class="tab-btn px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap bg-slate-800 text-slate-400 hover:bg-slate-700">รับเงินคืนลูกหนี้</button>
        </nav>
    </header>

    <!-- MAIN CONTENT -->
    <main class="flex-1 p-4 md:p-6 w-full max-w-3xl mx-auto">
        
        <!-- ============================================== -->
        <!-- TAB 1: INCOME -->
        <!-- ============================================== -->
        <div id="tab_income" class="tab-content active">
            <h2 class="text-xl font-bold mb-4 text-emerald-400"><i class="fa-solid fa-money-bill-wave mr-2"></i>บันทึกรายรับใหม่</h2>
            <form id="form_income" onsubmit="submitForm(event, 'Tab_Income')">
                <div class="space-y-4">
                    <div><label class="wm-label">วันที่</label><input type="date" name="date" id="i_date" class="wm-input" required></div>
                    <div>
                        <label class="wm-label">ประเภท ESBI</label>
                        <select name="esbi" class="wm-input" required>
                            <option value="E (Employee)">E - งานประจำ (Active)</option>
                            <option value="S (Self-Employed)">S - ฟรีแลนซ์/ธุรกิจส่วนตัว (Active)</option>
                            <option value="B (Business Owner)">B - เจ้าของกิจการ/ปันผลบริษัท (Passive)</option>
                            <option value="I (Investor)">I - ปันผลหุ้น/ดอกเบี้ย/ค่าเช่า (Passive)</option>
                        </select>
                    </div>
                    <div><label class="wm-label">หมวดหมู่รายรับ</label><input type="text" name="category" list="list-categories" class="wm-input" required placeholder="เช่น เงินเดือน, โบนัส, ปันผลหุ้น"></div>
                    <div><label class="wm-label">จำนวนเงิน (฿)</label><input type="number" name="amount" step="0.01" class="wm-input text-emerald-400 font-bold text-lg" required></div>
                    <div><label class="wm-label">เข้ากระเป๋าเงิน (Bucket)</label><input type="text" name="account" list="list-sub-accounts" class="wm-input" required placeholder="เลือกกระเป๋าที่รับเงิน"></div>
                    <div><label class="wm-label">Note</label><input type="text" name="note" class="wm-input"></div>
                    <div class="grid grid-cols-2 gap-3 mt-4">
                        <button type="button" onclick="addToQueue('form_income', 'Tab_Income')" class="py-3 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold rounded-lg shadow-lg border border-slate-700 transition-colors"><i class="fa-solid fa-plus text-blue-400 mr-1"></i> ลงคิวไว้ก่อน</button>
                        <button type="submit" class="py-3 bg-emerald-600 hover:bg-emerald-500 text-white font-bold rounded-lg shadow-lg shadow-emerald-900/50 transition-colors">บันทึกทันที</button>
                    </div>
                </div>
            </form>
        </div>

        <!-- ============================================== -->
        <!-- TAB 2: EXPENSES -->
        <!-- ============================================== -->
        <div id="tab_expense" class="tab-content">
            <h2 class="text-xl font-bold mb-4 text-rose-400"><i class="fa-solid fa-cart-shopping mr-2"></i>บันทึกรายจ่าย</h2>
            
            <!-- Quick Taps (อัปเดตข้อมูลจำลองใหม่) -->
            <div class="mb-6">
                <p class="text-xs text-slate-500 mb-2 font-bold uppercase tracking-wider">⚡ Quick Taps (กดปุ๊บกรอกปั๊บ)</p>
                <div id="quick-taps" class="flex gap-2 overflow-x-auto pb-2 hide-scrollbar">
                    <button type="button" onclick="fillForm('form_expense', {vivian: '30-Wants', category: 'Cafe / Snacks', amount: 45, account: 'กินใช้ส่วนตัว', note: 'เต่าบิน'})" class="px-4 py-2 bg-slate-800 rounded-full text-sm font-medium hover:bg-slate-700 whitespace-nowrap transition-colors border border-slate-700">☕ เต่าบิน 45.-</button>
                    <button type="button" onclick="fillForm('form_expense', {vivian: '50-Needs', category: 'Food / Groceries', amount: 60, account: 'กินใช้ส่วนตัว', note: 'ข้าวกล่อง'})" class="px-4 py-2 bg-slate-800 rounded-full text-sm font-medium hover:bg-slate-700 whitespace-nowrap transition-colors border border-slate-700">🍱 ข้าวกล่อง 60.-</button>
                    <button type="button" onclick="fillForm('form_expense', {vivian: '50-Needs', category: 'Gas / Toll fee', amount: 1000, account: 'บัญชีหลัก KTB', note: 'เติมน้ำมัน'})" class="px-4 py-2 bg-slate-800 rounded-full text-sm font-medium hover:bg-slate-700 whitespace-nowrap transition-colors border border-slate-700">⛽ น้ำมัน 1,000.-</button>
                    <button type="button" onclick="fillForm('form_expense', {vivian: '20-Future', category: 'กบข.', amount: 1000, account: 'บัญชีหลัก KTB', note: 'สะสม'})" class="px-4 py-2 bg-slate-800 rounded-full text-sm font-medium hover:bg-slate-700 whitespace-nowrap transition-colors border border-slate-700">📈 กบข. 1,000.-</button>
                </div>
            </div>

            <form id="form_expense" onsubmit="submitForm(event, 'Tab_Expenses')">
                <div class="space-y-4">
                    <div><label class="wm-label">วันที่</label><input type="date" name="date" id="e_date" class="wm-input" required></div>
                    <div>
                        <label class="wm-label">กฎ 50/30/20</label>
                        <select name="vivian" class="wm-input" required>
                            <option value="50-Needs">50% Needs (จำเป็นต้องจ่าย)</option>
                            <option value="30-Wants">30% Wants (ความสุข/ฟุ่มเฟือย)</option>
                            <option value="20-Future">20% Future (ออม/ลงทุน/โปะหนี้)</option>
                            <option value="Charity">Giving (ทำบุญ/บริจาค)</option>
                        </select>
                    </div>
                    <div><label class="wm-label">หมวดหมู่ (หรือชื่อเจ้าหนี้ถ้าจะโปะ)</label><input type="text" name="category" list="list-categories" class="wm-input" required placeholder="เช่น ค่าอาหาร, ดูหนัง, บัตร KTC"></div>
                    <div><label class="wm-label">จำนวนเงิน (฿)</label><input type="number" name="amount" step="0.01" class="wm-input text-rose-400 font-bold text-lg" required></div>
                    <div><label class="wm-label">จ่ายจากกระเป๋า</label><input type="text" name="account" list="list-sub-accounts" class="wm-input" required placeholder="เช่น บัญชีหลัก KTB, กินใช้ส่วนตัว"></div>
                    <div><label class="wm-label">Note</label><input type="text" name="note" class="wm-input"></div>
                    <div class="grid grid-cols-2 gap-3 mt-4">
                        <button type="button" onclick="addToQueue('form_expense', 'Tab_Expenses')" class="py-3 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold rounded-lg shadow-lg border border-slate-700 transition-colors"><i class="fa-solid fa-plus text-blue-400 mr-1"></i> ลงคิวไว้ก่อน</button>
                        <button type="submit" class="py-3 bg-rose-600 hover:bg-rose-500 text-white font-bold rounded-lg shadow-lg shadow-rose-900/50 transition-colors">บันทึกทันที</button>
                    </div>
                </div>
            </form>
        </div>

        <!-- ============================================== -->
        <!-- TAB 3: JOURNAL -->
        <!-- ============================================== -->
        <div id="tab_journal" class="tab-content">
            <h2 class="text-xl font-bold mb-4 text-blue-400"><i class="fa-solid fa-book mr-2"></i>ลงทุน / โอนย้าย / ลดหนี้ (เงินเก่า)</h2>
            <form id="form_journal" onsubmit="submitForm(event, 'Tab_Journal')">
                <div class="space-y-4">
                    <div><label class="wm-label">วันที่</label><input type="date" name="date" class="wm-input" required></div>
                    <div><label class="wm-label">อ้างอิงสินทรัพย์/กระเป๋า (พิมพ์ค้นหา)</label><input type="text" name="asset" list="list-assets" class="wm-input" required placeholder="เช่น หุ้น PTT, กินใช้ส่วนตัว"></div>
                    <div>
                        <label class="wm-label">ประเภทรายการ (Event)</label>
                        <select name="event" class="wm-input" required>
                            <option value="Transfer Out (โอนออก)">Transfer Out (โอนออก / หักเงินจากกระเป๋า)</option>
                            <option value="Transfer In (รับโอนเข้า)">Transfer In (รับโอนเข้า / เติมเงินลงกระเป๋า)</option>
                            <option value="Buy (ซื้อสินทรัพย์)">Buy (ซื้อสินทรัพย์เก็บเข้าพอร์ต)</option>
                            <option value="Sell (ขายสินทรัพย์)">Sell (ขายสินทรัพย์ / รับคืนจากลูกหนี้)</option>
                            <option value="Pay Principal (จ่ายเงินต้น/ลดหนี้)" class="text-red-400 font-bold">Pay Principal (จ่ายเงินต้น/ลดหนี้ ด้วยเงินเก่า)</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        <div><label class="wm-label">จำนวน (Qty)</label><input type="number" name="qty" id="j_qty" value="1" step="0.00001" class="wm-input" oninput="calcTotal()" required></div>
                        <div><label class="wm-label">ราคา/หน่วย</label><input type="number" name="price" id="j_price" step="0.01" class="wm-input" oninput="calcTotal()" required></div>
                        <div><label class="wm-label">ค่าธรรมเนียม</label><input type="number" name="fee" id="j_fee" value="0" step="0.01" class="wm-input" oninput="calcTotal()"></div>
                    </div>
                    <div><label class="wm-label">ยอดรวมสุทธิ (Total)</label><input type="number" name="total" id="j_total" step="0.01" class="wm-input text-blue-400 font-bold bg-slate-950" readonly required></div>
                    <div><label class="wm-label">Note</label><input type="text" name="note" class="wm-input"></div>
                    <div class="grid grid-cols-2 gap-3 mt-4">
                        <button type="button" onclick="addToQueue('form_journal', 'Tab_Journal')" class="py-3 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold rounded-lg shadow-lg border border-slate-700 transition-colors"><i class="fa-solid fa-plus text-blue-400 mr-1"></i> ลงคิวไว้ก่อน</button>
                        <button type="submit" class="py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-lg shadow-lg shadow-blue-900/50 transition-colors">บันทึกทันที</button>
                    </div>
                </div>
            </form>
        </div>

        <!-- ============================================== -->
        <!-- TAB 4: ASSETS -->
        <!-- ============================================== -->
        <div id="tab_asset" class="tab-content">
            <h2 class="text-xl font-bold mb-4 text-purple-400"><i class="fa-solid fa-building-columns mr-2"></i>ขึ้นทะเบียนทรัพย์สิน / ลูกหนี้</h2>
            <form id="form_asset" onsubmit="submitForm(event, 'Tab_Assets_Receivables')">
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="wm-label">ประเภท</label>
                            <select name="recordType" class="wm-input" required>
                                <option value="Asset (สินทรัพย์)">Asset (สินทรัพย์)</option>
                                <option value="Receivable (ลูกหนี้)">Receivable (ลูกหนี้)</option>
                            </select>
                        </div>
                        <div>
                            <label class="wm-label">Asset Class</label>
                            <select name="assetClass" class="wm-input" required>
                                <option value="Cash / Bank">เงินสด / เงินฝาก / สหกรณ์</option>
                                <option value="Stock / Fund">หุ้น / กองทุน</option>
                                <option value="Real Estate">อสังหาริมทรัพย์</option>
                                <option value="Commodity">ทองคำ / สินค้าโภคภัณฑ์</option>
                                <option value="Cryptocurrency">คริปโต</option>
                                <option value="Personal Loan">ปล่อยกู้ส่วนบุคคล</option>
                            </select>
                        </div>
                    </div>
                    <div><label class="wm-label">ชื่อรายการ (ไม่ซ้ำ)</label><input type="text" name="name" class="wm-input" required placeholder="เช่น หุ้น AOT, เงินฝาก KTB, สมชาย(เพื่อน)"></div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="wm-label">ราคาต้นทุน (ทุนรวม)</label><input type="number" name="buyPrice" step="0.01" class="wm-input" required></div>
                        <div><label class="wm-label">มูลค่าปัจจุบัน (ถ้ามี)</label><input type="number" name="curValue" step="0.01" class="wm-input"></div>
                    </div>
                    <div><label class="wm-label">Note / Theme (เช่น Dividend)</label><input type="text" name="note" class="wm-input"></div>
                    <div class="grid grid-cols-2 gap-3 mt-4">
                        <button type="button" onclick="addToQueue('form_asset', 'Tab_Assets_Receivables')" class="py-3 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold rounded-lg shadow-lg border border-slate-700"><i class="fa-solid fa-plus text-blue-400 mr-1"></i> ลงคิวไว้</button>
                        <button type="submit" class="py-3 bg-purple-600 hover:bg-purple-500 text-white font-bold rounded-lg shadow-lg">บันทึกทันที</button>
                    </div>
                </div>
            </form>
        </div>

        <!-- ============================================== -->
        <!-- TAB 5: DEBTS -->
        <!-- ============================================== -->
        <div id="tab_debt" class="tab-content">
            <h2 class="text-xl font-bold mb-4 text-amber-400"><i class="fa-solid fa-credit-card mr-2"></i>ขึ้นทะเบียนหนี้สิน</h2>
            <form id="form_debt" onsubmit="submitForm(event, 'Tab_Debts')">
                <div class="space-y-4">
                    <div><label class="wm-label">ชื่อเจ้าหนี้</label><input type="text" name="creditor" class="wm-input" required placeholder="เช่น บัตร KTC, บ้าน ธอส."></div>
                    <div>
                        <label class="wm-label">ประเภทหนี้</label>
                        <select name="type" class="wm-input" required>
                            <option value="Credit Card">บัตรเครดิต</option>
                            <option value="Personal Loan">สินเชื่อบุคคล / บัตรกดเงินสด</option>
                            <option value="Mortgage">สินเชื่อบ้าน</option>
                            <option value="Auto Loan">สินเชื่อรถยนต์</option>
                            <option value="Installment">ผ่อนสินค้า</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="wm-label">ยอดหนี้คงเหลือ</label><input type="number" name="principal" step="0.01" class="wm-input" required></div>
                        <div><label class="wm-label">ดอกเบี้ยต่อปี (%)</label><input type="number" name="rate" step="0.01" class="wm-input text-amber-400" required></div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="wm-label">วันตัดรอบบิล</label><input type="text" name="statement" class="wm-input" placeholder="เช่น ทุกวันที่ 5"></div>
                        <div><label class="wm-label">ขั้นต่ำที่ต้องจ่าย</label><input type="number" name="minPay" step="0.01" class="wm-input" required></div>
                    </div>
                    <div><label class="wm-label">Note</label><input type="text" name="note" class="wm-input"></div>
                    <div class="grid grid-cols-2 gap-3 mt-4">
                        <button type="button" onclick="addToQueue('form_debt', 'Tab_Debts')" class="py-3 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold rounded-lg shadow-lg border border-slate-700"><i class="fa-solid fa-plus text-blue-400 mr-1"></i> ลงคิวไว้</button>
                        <button type="submit" class="py-3 bg-amber-600 hover:bg-amber-500 text-white font-bold rounded-lg shadow-lg">บันทึกทันที</button>
                    </div>
                </div>
            </form>
        </div>

        <!-- ============================================== -->
        <!-- TAB 6: BUCKETS (SUB-ACCOUNTS) -->
        <!-- ============================================== -->
        <div id="tab_bucket" class="tab-content">
            <h2 class="text-xl font-bold mb-4 text-cyan-400"><i class="fa-solid fa-wallet mr-2"></i>สร้างกระเป๋าเงิน (Virtual Envelopes)</h2>
            <form id="form_bucket" onsubmit="submitForm(event, 'Tab_Sub_Accounts')">
                <div class="space-y-4">
                    <div><label class="wm-label">ชื่อกระเป๋า</label><input type="text" name="name" class="wm-input" required placeholder="เช่น กินใช้ส่วนตัว, เที่ยวญี่ปุ่น"></div>
                    <div>
                        <label class="wm-label">ประเภทกระเป๋า</label>
                        <select name="type" class="wm-input" required>
                            <option value="Expense Wallet">ใช้จ่ายทั่วไป (Expense)</option>
                            <option value="Sinking Fund">เก็บรอจ่าย (Sinking Fund)</option>
                            <option value="Emergency Fund">ฉุกเฉิน (Emergency)</option>
                            <option value="Investment">รอลงทุน (Investment)</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="wm-label">ยอดยกมา (ทิ้งว่างได้)</label><input type="number" name="balance" step="0.01" class="wm-input"></div>
                        <div><label class="wm-label">เป้าหมาย (Target)</label><input type="number" name="target" step="0.01" class="wm-input text-cyan-400" required></div>
                    </div>
                    <!-- หมายเหตุ: input type color บนมือถือจะใช้ UI พื้นฐานของเครื่องนั้นๆ -->
                    <div><label class="wm-label">สีประจำกระเป๋า (HEX)</label><input type="color" name="color" value="#0ea5e9" class="w-full h-12 bg-slate-900 border border-slate-700 rounded cursor-pointer"></div>
                    <div><label class="wm-label">Note</label><input type="text" name="note" class="wm-input" placeholder="กติกาการใช้กระเป๋านี้"></div>
                    <div class="grid grid-cols-2 gap-3 mt-4">
                        <button type="button" onclick="addToQueue('form_bucket', 'Tab_Sub_Accounts')" class="py-3 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold rounded-lg shadow-lg border border-slate-700"><i class="fa-solid fa-plus text-blue-400 mr-1"></i> ลงคิวไว้</button>
                        <button type="submit" class="py-3 bg-cyan-600 hover:bg-cyan-500 text-white font-bold rounded-lg shadow-lg">สร้างกระเป๋า</button>
                    </div>
                </div>
            </form>
        </div>

        <!-- ============================================== -->
        <!-- TAB 7: RECEIVABLE UPDATE -->
        <!-- ============================================== -->
        <div id="tab_recv" class="tab-content">
            <h2 class="text-xl font-bold mb-4 text-yellow-400"><i class="fa-solid fa-hand-holding-dollar mr-2"></i>อัปเดตสถานะรับเงินคืนลูกหนี้</h2>
            <form id="form_recv" onsubmit="submitForm(event, 'Tab_Recv_Update')">
                <div class="space-y-4">
                    <div><label class="wm-label">วันที่รับชำระ</label><input type="date" name="date" class="wm-input" required></div>
                    <div><label class="wm-label">อ้างอิงชื่อลูกหนี้</label><input type="text" name="recv" list="list-assets" class="wm-input" required></div>
                    <div><label class="wm-label">ยอดเงินที่ได้คืน (฿)</label><input type="number" name="pay" step="0.01" class="wm-input text-yellow-400 font-bold" required></div>
                    <div>
                        <label class="wm-label">สถานะหนี้ก้อนนี้</label>
                        <select name="status" class="wm-input" required>
                            <option value="Partial (คืนบางส่วน)">ทยอยคืน (Partial)</option>
                            <option value="Fully Paid (ปิดบัญชี)">คืนครบแล้ว (Fully Paid)</option>
                            <option value="Bad Debt / Write-off">หนี้สูญ / ตัดจบ (Write-off)</option>
                        </select>
                    </div>
                    <div><label class="wm-label">Note</label><input type="text" name="note" class="wm-input" placeholder="โอนเข้ากระเป๋าไหน?"></div>
                    <div class="grid grid-cols-2 gap-3 mt-4">
                        <button type="button" onclick="addToQueue('form_recv', 'Tab_Recv_Update')" class="py-3 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold rounded-lg shadow-lg border border-slate-700"><i class="fa-solid fa-plus text-blue-400 mr-1"></i> ลงคิวไว้</button>
                        <button type="submit" class="py-3 bg-yellow-600 hover:bg-yellow-500 text-white font-bold rounded-lg shadow-lg">บันทึกอัปเดต</button>
                    </div>
                </div>
            </form>
        </div>

    </main>

    <!-- 🛒 FLOATING CART UI (ตะกร้าลอยตัว) -->
    <div id="sync-queue-container" class="hidden fixed bottom-4 left-4 right-4 md:left-auto md:right-4 md:w-80 bg-slate-900 border border-slate-700 rounded-2xl shadow-2xl z-[100] flex flex-col max-h-[60vh] transition-all duration-300 transform translate-y-0">
        <div class="p-4 bg-slate-800 flex justify-between items-center cursor-pointer rounded-t-2xl" onclick="toggleQueueList()">
            <span class="font-bold text-white"><i class="fa-solid fa-basket-shopping text-blue-400 mr-2"></i>ตะกร้ารอส่ง: <span id="queue-count" class="bg-blue-600 px-2 py-0.5 rounded-full text-xs ml-1">0</span></span>
            <i class="fa-solid fa-chevron-up text-slate-400 transition-transform" id="queue-toggle-icon"></i>
        </div>
        
        <!-- รายการในตะกร้า (ซ่อนไว้ก่อน กดแล้วขยาย) -->
        <div id="queue-list-panel" class="hidden flex-1 overflow-y-auto bg-slate-900 p-4 border-t border-slate-700 space-y-2 hide-scrollbar">
            <!-- JS จะสร้างรายการตรงนี้ -->
        </div>

        <div class="p-4 bg-slate-900 border-t border-slate-800 rounded-b-2xl">
            <button onclick="syncAllQueue()" id="btn-sync-all" class="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl shadow-lg transition-colors flex justify-center items-center">
                <i class="fa-solid fa-cloud-arrow-up mr-2"></i> ส่งข้อมูลทั้งหมด
            </button>
        </div>
    </div>

    <!-- JS LOGIC -->
    <script>
        // ⚠️ ใส่ URL ของคุณตรงนี้
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyEyXfYLmOI8i0o-jRB-ikO_MB0bc7Ft3mHo2Zdh3bvg9dqgxDig61lH60QFi70m1qCSw/exec";

        // ==========================================
        // UI & TABS MANAGEMENT
        // ==========================================
        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => {
                el.classList.remove('active', 'bg-emerald-500/20', 'text-emerald-400', 'border-emerald-500/50');
                el.classList.add('bg-slate-800', 'text-slate-400');
            });
            document.getElementById(tabId).classList.add('active');
            const activeBtn = event.currentTarget || document.querySelector(`[onclick="openTab('${tabId}')"]`);
            activeBtn.classList.remove('bg-slate-800', 'text-slate-400');
            activeBtn.classList.add('active', 'bg-emerald-500/20', 'text-emerald-400', 'border-emerald-500/50');
        }

        document.querySelectorAll('input[type="date"]').forEach(el => el.valueAsDate = new Date());

        function calcTotal() {
            const qty = parseFloat(document.getElementById('j_qty').value) || 0;
            const price = parseFloat(document.getElementById('j_price').value) || 0;
            const fee = parseFloat(document.getElementById('j_fee').value) || 0;
            document.getElementById('j_total').value = ((qty * price) + fee).toFixed(2);
        }

        function fillForm(formId, data) {
            const form = document.getElementById(formId);
            Object.keys(data).forEach(key => {
                const input = form.elements[key];
                if (input) input.value = data[key];
            });
            // กระพริบขอบเพื่อให้รู้ว่าฟิลด์ถูกเติม
            form.classList.add('border', 'border-blue-500', 'rounded-xl', 'p-2');
            setTimeout(() => form.classList.remove('border', 'border-blue-500', 'rounded-xl', 'p-2'), 500);
        }

        // ==========================================
        // FETCH AUTOCOMPLETE DATA (แก้มารวม Asset กับ Bucket แล้ว)
        // ==========================================
        async function fetchAutocompleteData() {
            if (GAS_WEB_APP_URL === "YOUR_GAS_WEB_APP_URL_HERE" || !GAS_WEB_APP_URL.startsWith("http")) return;
            const syncDot = document.getElementById('data-sync-dot');
            if(syncDot) syncDot.classList.remove('hidden');

            try {
                const response = await fetch(GAS_WEB_APP_URL + "?action=getMetadata");
                const result = await response.json();

                if (result.status === "success" && result.data) {
                    const data = result.data;
                    if(data.subAccounts) {
                        document.getElementById('list-sub-accounts').innerHTML = data.subAccounts.map(item => `<option value="${item}"></option>`).join('');
                    }
                    if(data.categories) {
                        document.getElementById('list-categories').innerHTML = data.categories.map(item => `<option value="${item}"></option>`).join('');
                    }
                    
                    // 🌟 รวมชื่อ ทรัพย์สิน และ กระเป๋าเงิน เข้าด้วยกันให้ Journal เลือกได้
                    let combinedList = [];
                    if (data.assets) combinedList = combinedList.concat(data.assets);
                    if (data.subAccounts) combinedList = combinedList.concat(data.subAccounts);

                    if(combinedList.length > 0) {
                        document.getElementById('list-assets').innerHTML = combinedList.map(item => `<option value="${item}"></option>`).join('');
                        document.getElementById('list-debts').innerHTML = combinedList.map(item => `<option value="${item}"></option>`).join(''); // ใช้ตัวเดียวกันได้
                    }
                }
            } catch (error) {
                console.error("Autocomplete fetch failed.", error);
            } finally {
                if(syncDot) syncDot.classList.add('hidden');
            }
        }
        fetchAutocompleteData();

        // ==========================================
        // 🛒 QUEUE / CART SYSTEM (อัปเกรดใหม่)
        // ==========================================
        let syncQueue = JSON.parse(localStorage.getItem('wm_queue') || '[]');

        function updateQueueUI() {
            const container = document.getElementById('sync-queue-container');
            const countBadge = document.getElementById('queue-count');
            const headerCount = document.getElementById('header-queue-count');
            const panel = document.getElementById('queue-list-panel');
            
            if (syncQueue.length > 0) {
                container.classList.remove('hidden');
                countBadge.innerText = syncQueue.length;
                headerCount.innerText = syncQueue.length;
                
                panel.innerHTML = syncQueue.map((item, index) => {
                    // ดึงตัวเลขมาโชว์ให้สวยๆ
                    const amountVal = item.payload.amount || item.payload.total || item.payload.qty || item.payload.balance || item.payload.pay || '0';
                    const nameVal = item.payload.category || item.payload.event || item.payload.name || item.payload.creditor || item.payload.recv || 'รายการ';
                    
                    return `
                    <div class="flex justify-between items-center bg-slate-800 p-3 rounded-lg border border-slate-700">
                        <div class="flex flex-col overflow-hidden">
                            <span class="text-xs text-blue-400 font-bold truncate">${item.targetSheet.replace('Tab_', '')}</span>
                            <span class="text-sm text-white truncate">฿${amountVal} <span class="text-slate-400 text-xs ml-1">${nameVal}</span></span>
                        </div>
                        <button type="button" onclick="removeFromQueue(${index})" class="text-red-400 hover:text-red-300 p-2 ml-2 flex-shrink-0 bg-red-500/10 rounded-md"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                `}).join('');
            } else {
                container.classList.add('hidden');
                panel.classList.add('hidden'); 
                headerCount.innerText = '0';
            }
        }

        function toggleQueueList() {
            const panel = document.getElementById('queue-list-panel');
            const icon = document.getElementById('queue-toggle-icon');
            // เปิดตะกร้าถ้ามีของ
            if(syncQueue.length > 0) {
                panel.classList.toggle('hidden');
                if(panel.classList.contains('hidden')){
                    icon.style.transform = 'rotate(0deg)';
                } else {
                    icon.style.transform = 'rotate(180deg)';
                }
            }
        }

        function removeFromQueue(index) {
            syncQueue.splice(index, 1);
            localStorage.setItem('wm_queue', JSON.stringify(syncQueue));
            updateQueueUI();
        }

        function addToQueue(formId, targetSheet) {
            const form = document.getElementById(formId);
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const formData = new FormData(form);
            const payload = Object.fromEntries(formData.entries());
            
            syncQueue.push({ targetSheet, payload });
            localStorage.setItem('wm_queue', JSON.stringify(syncQueue));
            updateQueueUI();

            // Effect ปุ่มสีเขียว
            const btn = event.target.closest('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-check text-green-400"></i> ลงคิวแล้ว';
            btn.classList.replace('bg-slate-800', 'bg-emerald-900/50');
            
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.classList.replace('bg-emerald-900/50', 'bg-slate-800');
                form.reset();
                if(formId === 'form_expense' || formId === 'form_income') document.getElementById('e_date').valueAsDate = new Date();
                if(formId === 'form_journal') document.getElementById('j_qty').value = 1;
            }, 1000);
        }

        async function syncAllQueue() {
            if (syncQueue.length === 0) return;
            if (!navigator.onLine) {
                Swal.fire({ icon: 'error', title: 'ออฟไลน์', text: 'รอเชื่อมต่อเน็ตก่อนนะครับ', background: '#1e293b', color: '#fff' });
                return;
            }

            const btn = document.getElementById('btn-sync-all');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> กำลังส่งข้อมูล...';
            btn.disabled = true;

            // จัดกลุ่มข้อมูลตาม Sheet ให้ Tier 2 อ่านง่ายๆ
            const groupedData = {};
            syncQueue.forEach(item => {
                if(!groupedData[item.targetSheet]) groupedData[item.targetSheet] = [];
                groupedData[item.targetSheet].push(item.payload);
            });

            let successCount = 0;
            try {
                // ส่งแยกทีละ Sheet (ตามการทำงานของ doPost เดิม)
                for (const [sheet, payloadsArray] of Object.entries(groupedData)) {
                    const batchRequest = { targetSheet: sheet, payload: payloadsArray };
                    await fetch(GAS_WEB_APP_URL, {
                        method: 'POST', mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(batchRequest)
                    });
                    successCount += payloadsArray.length;
                }

                syncQueue = [];
                localStorage.removeItem('wm_queue');
                updateQueueUI();
                fetchAutocompleteData(); // อัปเดตรายชื่อใหม่เผื่อมีการสร้างใหม่
                
                btn.innerHTML = '<i class="fa-solid fa-check text-green-400 mr-2"></i> ส่งสำเร็จ!';
                Swal.fire({ icon: 'success', title: 'ส่งข้อมูลเรียบร้อย!', text: `เคลียร์ตะกร้า ${successCount} รายการแล้ว`, background: '#1e293b', color: '#fff' });
                
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    document.getElementById('queue-list-panel').classList.add('hidden');
                    document.getElementById('queue-toggle-icon').style.transform = 'rotate(0deg)';
                }, 2000);

            } catch (error) {
                console.error(error);
                btn.innerHTML = '<i class="fa-solid fa-triangle-exclamation text-red-400 mr-2"></i> ส่งล้มเหลว';
                Swal.fire({ icon: 'error', title: 'ข้อผิดพลาด', text: 'ไม่สามารถส่งข้อมูลได้ กรุณาลองใหม่', background: '#1e293b', color: '#fff' });
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }, 2000);
            }
        }

        // ==========================================
        // SINGLE SUBMIT (ส่งทีละรายการแบบเดิม)
        // ==========================================
        async function submitForm(e, targetSheet) {
            e.preventDefault();
            if (!navigator.onLine) {
                addToQueue(e.target.id, targetSheet); // ถ้าออฟไลน์ให้เข้าตะกร้าอัตโนมัติ
                Swal.fire({ icon: 'info', title: 'ออฟไลน์', text: 'นำลงตะกร้าให้แล้ว ส่งตอนเน็ตมานะ', background: '#1e293b', color: '#fff', timer: 2000 });
                return;
            }

            const form = e.target;
            const submitBtn = form.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> กำลังบันทึก...';
            submitBtn.disabled = true;

            const formData = new FormData(form);
            const payload = Object.fromEntries(formData.entries());
            const requestData = { targetSheet: targetSheet, payload: payload };

            try {
                await fetch(GAS_WEB_APP_URL, {
                    method: 'POST', mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestData)
                });
                
                Swal.fire({ icon: 'success', title: 'บันทึกสำเร็จ!', background: '#1e293b', color: '#fff', timer: 1500, showConfirmButton: false });
                form.reset();
                if(form.id === 'form_expense' || form.id === 'form_income') document.getElementById('e_date').valueAsDate = new Date();
                if(form.id === 'form_journal') document.getElementById('j_qty').value = 1;
                fetchAutocompleteData(); // อัปเดต Dropdown ใหม่ เผื่อมีการสร้างทรัพย์สิน/กระเป๋าใหม่

            } catch (error) {
                Swal.fire({ icon: 'error', title: 'ผิดพลาด', text: 'กรุณาลองใหม่อีกครั้ง', background: '#1e293b', color: '#fff' });
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        }

        // เช็คสถานะเน็ต
        function updateOfflineBadge() {
            const badge = document.getElementById('offline-badge');
            if (navigator.onLine) badge.classList.add('hidden');
            else badge.classList.remove('hidden');
        }
        window.addEventListener('online',  updateOfflineBadge);
        window.addEventListener('offline', updateOfflineBadge);

        // ทำงานเมื่อโหลดหน้าเสร็จ
        document.addEventListener('DOMContentLoaded', () => {
            updateQueueUI();
            updateOfflineBadge();
        });
    </script>
</body>
</html>
